<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>FRC team info</title>
</head>
<body>
<h3>A utility for finding info on an FRC team.</h3>
<p>Built by: Jaxson Slotnick-Paige</p>
<p>Powered by: <a href="https://www.thebluealliance.com/">The Blue Alliance</a></p>
<br>
<label for="yearInput">Year:</label>
<input id="yearInput" type="number">
<br><br>
<div style="border: 1px solid black;">Selected Years:<p id="selectedYears"></p></div>
<button id="removeYear">Remove</button>
<br><br>
<label for="teamInput">Team Input:</label>
<input id="teamInput" type="number">
<br><br>
<div style="border: 1px solid black;">Selected Teams:<p id="selectedTeams"></p></div>
<button id="remove">Remove</button>
<br><br>
<a id="downloadA"><button id="GETbutton">Get .csv</button></a>
<p id="teamName"></p>

<script>
    const teamInput = document.getElementById("teamInput");
    const yearInput = document.getElementById("yearInput");
    const selectedTeams = document.getElementById("selectedTeams");
    const selectedYears = document.getElementById("selectedYears");
    const removeBtn = document.getElementById("remove");
    const removeYear = document.getElementById("removeYear");
    const GETbutton = document.getElementById("GETbutton");
    const downloadA = document.getElementById("downloadA");
    const teamName = document.getElementById("teamName");

    teams = [];
    years = []

    const currentYear = new Date().getFullYear();

    yearInput.addEventListener("change", function () {
        if (Number(yearInput.value) > currentYear) {yearInput.value = currentYear;}
        else if (Number(yearInput.value) < 2016) {yearInput.value = 2016;}
        years.push(String(" " + yearInput.value))
        selectedYears.textContent = years;
        yearInput.value = "";
    })

    removeYear.addEventListener("click", function () {
        years.pop();
        selectedYears.textContent = years;
    })

    teamInput.addEventListener("change", function () {
        if (Number(teamInput.value) < 1) {teamInput.value = "1";}
        else if (Number(teamInput.value) > 100000) {teamInput.value = "100000";}
        teams.push(String(" " + teamInput.value));
        selectedTeams.textContent = teams;
        teamInput.value = "";
    })

    removeBtn.addEventListener("click", function () {
        teams.pop();
        selectedTeams.textContent = teams;
    })

    GETbutton.addEventListener("click", async function () {
        GETbutton.disabled = true;
        yearInput.disabled = true;
        teamInput.disabled = true;
        removeBtn.disabled = true;
        removeYear.disabled = true;

        csv = "";

        for (const team of teams) {
        for (const year of years) {


            csv += "Team:" + team.trim() + ", year: " + year.trim() + "\n"
            + "Comp name, Type, Week, # of playoffs played, Avg pts, Avg qual pts, Avg playoff pts, Playoff/qualifier % diff, In vs off season change\n"

            const res1 = await fetch("https://www.thebluealliance.com/api/v3/team/frc" + team.trim() + "/events/"+year.trim()+"?X-TBA-Auth-Key=xy28913hEz1qhzr6jPckDxbF6ZBTC5Y93TCKeAO0ZdSl61DCu2chD1tkGD2KsxoX");
            const events = await res1.json();

            const res2 = await fetch("https://www.thebluealliance.com/api/v3/team/frc" + team.trim() + "/matches/"+year.trim()+"/simple?X-TBA-Auth-Key=xy28913hEz1qhzr6jPckDxbF6ZBTC5Y93TCKeAO0ZdSl61DCu2chD1tkGD2KsxoX");
            const matches = await res2.json();

            total_score_sum = 0; total_num_matches = 0; total_qual_score_sum = 0; total_qual_num_matches = 0; total_playoff_score_sum = 0; total_playoff_num_matches = 0; 

            offseason_score_sum = 0; offseason_num_matches = 0; inseason_score_sum = 0; inseason_num_matches = 0;

            teamName.textContent = "Downloading data for: " + team.trim();

            if (res1.status != 404 && events.lengh != 0) {

                offseason_comps = [];
                inseason_comps = [];
                for (const event of events) {
                    if (event.event_type_string == "Offseason") { offseason_comps.push(event.key); }
                    else if (event.event_type_string != "Preseason") { inseason_comps.push(event.key); }
                }

                //get avg total
                for (const match of matches) {
                    total_num_matches++;
                    
                    isOffSeason = 0;
                    isInSeason = 0;

                    for (const comp of offseason_comps) {
                        if (comp == match.event_key) {isOffSeason = 1; offseason_num_matches++;}
                    }

                    for (const comp of inseason_comps) {
                        if (comp == match.event_key) {isInSeason = 1; inseason_num_matches++;}
                    }

                    //if blue
                    if (match.alliances.blue.team_keys[0] == "frc"+team.trim() || match.alliances.blue.team_keys[1] == "frc"+team.trim() || match.alliances.blue.team_keys[2] == "frc"+team.trim()) {
                        total_score_sum += match.alliances.blue.score;
                        if (match.comp_level == "qm") { total_qual_score_sum += match.alliances.blue.score; total_qual_num_matches++; }
                        else { total_playoff_score_sum += match.alliances.blue.score; total_playoff_num_matches++; }

                        if (isOffSeason && !isInSeason) {offseason_score_sum += match.alliances.blue.score;}
                        if (!isOffSeason && isInSeason) {inseason_score_sum += match.alliances.blue.score;}
                    
                    //if red
                    } else {
                        total_score_sum += match.alliances.red.score;
                        if (match.comp_level == "qm") { total_qual_score_sum += match.alliances.red.score; total_qual_num_matches++; }
                        else { total_playoff_score_sum += match.alliances.red.score; total_playoff_num_matches++; }

                        if (isOffSeason && !isInSeason) {offseason_score_sum += match.alliances.red.score;}
                        if (!isOffSeason && isInSeason) {inseason_score_sum += match.alliances.red.score;}
                    }


                }

                csv += "Season avg, N/A, N/A, N/A," 
                + String(Math.round((total_score_sum/total_num_matches)*100)/100) + ","
                + String(Math.round((total_qual_score_sum/total_qual_num_matches)*100)/100) + ","
                + String(Math.round((total_playoff_score_sum/total_playoff_num_matches)*100)/100) + ","
                + String(Math.round((((total_playoff_score_sum/total_playoff_num_matches)-(total_qual_score_sum/total_qual_num_matches))/(total_playoff_score_sum/total_playoff_num_matches))*100)) + "%,"
                + String(Math.round((((offseason_score_sum/offseason_num_matches)-(inseason_score_sum/inseason_num_matches))/(offseason_score_sum/offseason_num_matches))*100)) + "%\n"
                console.log(offseason_score_sum)
                console.log(offseason_num_matches)
                console.log(inseason_score_sum)
                console.log(inseason_num_matches)

                //get avgs for each match
                for (const event of events) {

                    score_sum = 0; num_matches = 0; qual_score_sum = 0; qual_num_matches = 0; playoff_score_sum = 0; playoff_num_matches = 0; 

                    for (const match of matches) {
                        if (match.event_key == event.key) {
                            num_matches++;

                            if (match.alliances.blue.team_keys[0] == "frc"+team.trim() || match.alliances.blue.team_keys[1] == "frc"+team.trim() || match.alliances.blue.team_keys[2] == "frc"+team.trim()) {
                                score_sum += match.alliances.blue.score;
                                if (match.comp_level == "qm") { qual_score_sum += match.alliances.blue.score; qual_num_matches++; }
                                else { playoff_score_sum += match.alliances.blue.score; playoff_num_matches++; }
                            
                            //if red
                            } else {
                                score_sum += match.alliances.red.score;
                                if (match.comp_level == "qm") { qual_score_sum += match.alliances.red.score; qual_num_matches++; }
                                else { playoff_score_sum += match.alliances.red.score; playoff_num_matches++; }
                            }
                        }
                    }

                    // console.log(String(event.name).replaceAll(",",""))
                    // console.log(event.event_type_string)
                    // console.log(String(event.week))
                    // console.log(String(playoff_num_matches))
                    // console.log(String(Math.round((score_sum/num_matches)*100)/100))
                    // console.log(String(Math.round((qual_score_sum/qual_num_matches)*100)/100))
                    // console.log(String(Math.round((playoff_score_sum/playoff_num_matches)*100)/100))
                    // console.log(String(Math.round((((playoff_score_sum/playoff_num_matches)-(qual_score_sum/qual_num_matches))/(playoff_score_sum/playoff_num_matches))*100)/100))

                    csv += String(event.name).replaceAll(",","") + "," + event.event_type_string + "," + String(event.week) + "," + String(playoff_num_matches) + ","
                    + String(Math.round((score_sum/num_matches)*100)/100) + ","
                    + String(Math.round((qual_score_sum/qual_num_matches)*100)/100) + ","
                    + String(Math.round((playoff_score_sum/playoff_num_matches)*100)/100) + ","
                    + String(Math.round((((playoff_score_sum/playoff_num_matches)-(qual_score_sum/qual_num_matches))/(playoff_score_sum/playoff_num_matches))*100)) + "%\n"
                }
                csv += "\n";
            }
        }
        }

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        downloadA.href = url;

        fileName = yearInput.value + "_teams";
        for (const team of teams) {fileName += "_" + team;}
        fileName += ".csv";

        downloadA.download = fileName;
        downloadA.click();
        teamName.textContent = "Done";

        GETbutton.disabled = false;
        yearInput.disabled = false;
        teamInput.disabled = false;
        removeBtn.disabled = false;
        removeYear.disabled = false;
    })
</script>
</body>
</html>
