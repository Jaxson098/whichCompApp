<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JS Bin</title>
</head>
<body>
<script>
    const url = "https://frc-api.firstinspires.org/v3.0/2024/matches/mizee";

    const username = "Jaxson";
    const authKey = "076cc2e9-2f4e-4351-a747-ac2861c6258d";

    // Step 1: combine username + key
    const raw = `${username}:${authKey}`;

    // Step 2: Base64 encode
    // Browser:
    const token = btoa(raw);

    // Node.js (uncomment instead if using Node):
    // const token = Buffer.from(raw).toString("base64");

    fetch(url, {
    method: "GET",
    headers: {
        "Authorization": `Basic ${token}`,
        "Content-Type": "application/json"
    }
    })
    .then(res => {
        if (!res.ok) throw new Error(`Status: ${res.status}`);
        return res.json();
    })
    .then(data => console.log(data))
    .catch(err => console.error(err));
</script>
</body>
</html>
